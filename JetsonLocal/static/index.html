<!DOCTYPE html>
<html lang="en" data-theme="tamu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA Edge App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dashboard-page">
    <div class="dashboard-section">
        <div class="aura-header">
            <div class="aura-panel">
                <div class="aura-text">
                    <h1 class="aura-title">AURA Edge Terminal</h1>
                    <span class="aura-sub">Jetson Orin Nano Local Touchscreen App</span>
                </div>
                <div id="status-badge" class="status-indicator">Booting...</div>
            </div>
        </div>

        <div class="dashboard-cards">
            <div class="filo-grid">
                <div class="filo-item">
                    <div class="filo-top">
                        <span class="filo-label">CPU / GPU Usage</span>
                    </div>
                    <div class="filo-value">
                        <div id="cpu-val">CPU: --%</div>
                        <div id="gpu-val" style="font-size: 18px; margin-top: 6px;">GPU: --%</div>
                    </div>
                </div>

                <div class="filo-item">
                    <div class="filo-top">
                        <span class="filo-label">Database</span>
                    </div>
                    <div class="filo-value" id="db-val">--</div>
                </div>

                <div class="filo-item">
                    <div class="filo-top">
                        <span class="filo-label">Connection</span>
                    </div>
                    <div class="filo-value" id="net-val">Offline</div>
                </div>
            </div>
        </div>

        <div class="control-card">
            <div class="control-title">Touch Controls</div>
            <div class="dpad">
                <button class="dpad-btn" data-move="forward">Forward</button>
                <div class="dpad-row">
                    <button class="dpad-btn" data-move="left">Left</button>
                    <button class="dpad-btn stop" data-move="stop">Stop</button>
                    <button class="dpad-btn" data-move="right">Right</button>
                </div>
                <button class="dpad-btn" data-move="backward">Backward</button>
            </div>
        </div>

        <main id="chat-container" class="chat-box"></main>

        <div class="input-bar">
            <input
                id="chat-input"
                type="text"
                placeholder="Type a message to AURA..."
            />
            <button id="send-btn">Send</button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
